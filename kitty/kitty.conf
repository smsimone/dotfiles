# vim:fileencoding=utf-8:foldmethod=marker


font_family      MonispaceNe Nerd Font
bold_font        MonispaceNe Nerd Font
italic_font      MonispaceRd Nerd Font
bold_italic_font MonispaceRd Nerd Font

tab_bar_min_tabs            1
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

font_size 11
sync_to_monitor no

defaults write NSGlobalDomain KeyRepeat -int 1
defaults write NSGlobalDomain InitialKeypRepeat -int 15

include current-theme.conf

remember_window_size  no
initial_window_width  640
initial_window_height 400

draw_minimal_borders yes
hide_window_decorations no

tab_bar_style powerline
tab_bar_min_tabs 2

macos_titlebar_color background
macos_show_window_title_in none

map f5 load_config_file /Users/simonemasoero/.config/kitty/kitty.conf
