# import = ["~/.config/alacritty/themes/catppuccin-mocha.toml"]
import = ["~/.config/alacritty/themes/cyberdream.toml"]
live_config_reload = true

[env]
TERM = "xterm-256color"

[window.padding]
x = 5
y = 5

[window]
dynamic_padding = true
dynamic_title = false
decorations = "buttonless"
decorations_theme_variant = "None"
startup_mode = "Windowed"
blur = true
opacity = 0.9

[font]
size = 12

[font.offset]
x = 0
y = 0

[font.glyph_offset]
x = 0
y = 0

[font.normal]
family = "MonispaceRd Nerd Font"
style = "Medium"

[font.bold]
family = "MonispaceRd Nerd Font"
style = "Bold"

[font.italic]
family = "MonispaceRd Nerd Font"
style = "Italic"

[font.bold_italic]
family = "MonispaceRd Nerd Font"
style = "Bold Italic"

[debug]
render_timer = false

[mouse]
hide_when_typing = true

[shell]
program = "zsh"
args = ["-c", "tmux a || tmux"]
